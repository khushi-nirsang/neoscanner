<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeoScanner Report</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; color: #172026; background: #f4f7f9; }
    header { padding: 24px 32px; background: #14213d; color: #fff; }
    main { padding: 24px 32px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { padding: 12px; border-bottom: 1px solid #dce3e8; text-align: left; vertical-align: top; }
    th { background: #e9eff4; font-size: 13px; text-transform: uppercase; }
    .sev-critical { color: #9d0208; font-weight: 700; }
    .sev-high { color: #d00000; font-weight: 700; }
    .sev-medium { color: #dc8a00; font-weight: 700; }
    .sev-low { color: #2d6a4f; font-weight: 700; }
    .empty { padding: 24px; background: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>NeoScanner Report</h1>
    <p>Generated at 2026-06-03 12:09:14.8535813 &#43;0000 UTC</p>
  </header>
  <main>
    
    <table>
      <thead>
        <tr>
          <th>Target</th>
          <th>Type</th>
          <th>Severity</th>
          <th>Details</th>
          <th>Evidence</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody>
        
        <tr>
          <td>https://example.com</td>
          <td>Server header exposure</td>
          <td class="sev-low">low</td>
          <td>The response exposes server technology through the Server header.</td>
          <td>cloudflare</td>
          <td>2026-06-03 12:09:12.701083 &#43;0000 UTC</td>
        </tr>
        
      </tbody>
    </table>
    
  </main>
</body>
</html>
